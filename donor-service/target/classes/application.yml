server:
  port: 8082

spring:
  application:
    name: donor-service
  datasource:
    url: jdbc:mysql://localhost:3306/bbank
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver  # Updated driver class
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect  # Updated to MySQL dialect
    database-platform: org.hibernate.dialect.MySQL8Dialect  # Updated to MySQL dialect
